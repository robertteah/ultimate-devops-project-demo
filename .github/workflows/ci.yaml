name: product-catalog-ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  docker:
    runs-on: self-hosted

    outputs:
      image-uri: ${{ steps.set-image-uri.outputs.image-uri }}

    env:
      AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      FLOCI_ECR_REGISTRY: ${{ secrets.FLOCI_ECR_REGISTRY }}
      FLOCI_ECR_REPOSITORY: ${{ secrets.FLOCI_ECR_REPOSITORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to Floci ECR
        run: |
          aws ecr get-login-password \
            --endpoint-url "$AWS_ENDPOINT_URL" \
          | docker login \
            --username AWS \
            --password-stdin "$FLOCI_ECR_REGISTRY"

      - name: Ensure ECR repository exists
        run: |
          aws ecr create-repository \
            --repository-name "$FLOCI_ECR_REPOSITORY" \
            --endpoint-url "$AWS_ENDPOINT_URL" || true

      - name: Set image URI
        id: set-image-uri
        run: |
          IMAGE_URI="$FLOCI_ECR_REGISTRY/$FLOCI_ECR_REPOSITORY:${{ github.run_id }}"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          echo "image-uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Pull upstream image for scanning
        run: docker pull ghcr.io/open-telemetry/demo:2.2.0-product-catalog

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/open-telemetry/demo:2.2.0-product-catalog
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Configure BuildKit insecure registry
        run: |
          cat > /tmp/buildkitd.toml <<'EOF'
          [registry."host.docker.internal:5100"]
            http = true
            insecure = true
          EOF

          cat /tmp/buildkitd.toml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          config: /tmp/buildkitd.toml

      - name: Build and push to Floci ECR
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -t "$IMAGE_URI" \
            -f src/product-catalog/Dockerfile \
            src/product-catalog

  updatek8s:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update tag in Kubernetes deployment manifest
        run: |
          sed -i "s|image: .*productcatalog.*|image: ${{ needs.docker.outputs.image-uri }}|" \
            kubernetes/productcatalog/deploy.yaml

      - name: Commit and push changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add kubernetes/productcatalog/deploy.yaml
          git diff --staged --quiet || git commit -m "[CI]: Update product catalog image tag to ${{ github.run_id }}"
          git push origin HEAD:main 