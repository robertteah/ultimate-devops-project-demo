name: product-catalog-ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write

jobs:
  docker:
    runs-on: self-hosted

    outputs:
      image-uri: ${{ steps.set-image-uri.outputs.image-uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::000000000000:role/github-actions-role
          aws-region: us-east-1

      - name: Login to Floci ECR
        env:
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          FLOCI_ECR_REGISTRY: ${{ secrets.FLOCI_ECR_REGISTRY }}
        run: |
          aws ecr get-login-password \
            --endpoint-url "$AWS_ENDPOINT_URL" \
          | docker login \
            --username AWS \
            --password-stdin "$FLOCI_ECR_REGISTRY"

      - name: Ensure ECR repository exists
        env:
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          FLOCI_ECR_REPOSITORY: ${{ secrets.FLOCI_ECR_REPOSITORY }}
        run: |
          aws ecr create-repository \
            --repository-name "$FLOCI_ECR_REPOSITORY" \
            --endpoint-url "$AWS_ENDPOINT_URL" || true

      - name: Set image URI
        id: set-image-uri
        env:
          FLOCI_ECR_REGISTRY: ${{ secrets.FLOCI_ECR_REGISTRY }}
          FLOCI_ECR_REPOSITORY: ${{ secrets.FLOCI_ECR_REPOSITORY }}
        run: |
          IMAGE_URI="$FLOCI_ECR_REGISTRY/$FLOCI_ECR_REPOSITORY:${{ github.run_id }}"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          echo "image-uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/open-telemetry/demo:2.2.0-productcatalogservice
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to Floci ECR
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -t "$IMAGE_URI" \
            -f src/product-catalog/Dockerfile \
            src/product-catalog

  updatek8s:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update tag in Kubernetes deployment manifest
        run: |
          sed -i "s|image: .*productcatalog.*|image: ${{ needs.docker.outputs.image-uri }}|" \
            kubernetes/productcatalog/deploy.yaml

      - name: Commit and push changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add kubernetes/productcatalog/deploy.yaml
          git diff --staged --quiet || git commit -m "[CI]: Update product catalog image tag to ${{ github.run_id }}"
          git push origin HEAD:main