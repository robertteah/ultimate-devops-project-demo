name: product-catalog-ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go 1.26
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Build
        run: |
          cd src/product-catalog
          go mod download
          go build -o product-catalog-service main.go

      - name: Unit tests
        run: |
          cd src/product-catalog
          go test ./...

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go 1.26
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.55.2
          working-directory: src/product-catalog
          args: ./...

  docker:
    runs-on: self-hosted
    needs:
      - build
      - code-quality

    outputs:
      image-uri: ${{ steps.set-image-uri.outputs.image-uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (Floci)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::000000000000:role/github-actions-role
          role-chaining: true
          aws-endpoint-url-sts: ${{ env.AWS_ENDPOINT_URL }}

      - name: Login to Floci ECR
        run: |
          aws ecr get-login-password \
            --endpoint-url "$AWS_ENDPOINT_URL" \
          | docker login \
            --username AWS \
            --password-stdin "$FLOCI_ECR_REGISTRY"

      - name: Ensure ECR repository exists
        run: |
          aws ecr create-repository \
            --repository-name "$FLOCI_ECR_REPOSITORY" \
            --endpoint-url "$AWS_ENDPOINT_URL" || true

      - name: Set image URI
        run: |
          echo "IMAGE_URI=$FLOCI_ECR_REGISTRY/$FLOCI_ECR_REPOSITORY:${{ github.run_id }}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to Floci ECR
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -t "$IMAGE_URI" \
            -f src/product-catalog/Dockerfile \
            src/product-catalog

      - name: Set image URI output
        id: set-image-uri
        run: |
          echo "image-uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_URI }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  updatek8s:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Update tag in Kubernetes deployment manifest
        run: |
          sed -i "s|image: .*|image: ${{ needs.docker.outputs.image-uri }}|" kubernetes/productcatalog/deploy.yaml

      - name: Commit and push changes
        run: |
          git config --global user.email "${{ secrets.ACTOR }}@users.noreply.github.com"
          git config --global user.name "${{ secrets.ACTOR }}"
          git add kubernetes/productcatalog/deploy.yaml
          git commit -m "[CI]: Update product catalog image tag"
          git push origin HEAD:main -f